name: PR Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      # PR 打开/更新时：构建并部署预览
      - name: Install dependencies
        if: github.event.action != 'closed'
        run: pnpm install

      - name: Build bani-ui
        if: github.event.action != 'closed'
        run: pnpm run build

      - name: Build docs
        if: github.event.action != 'closed'
        run: pnpm run build:docs

      - name: Deploy preview to Sealos
        if: github.event.action != 'closed'
        run: |
          cd packages/docs/.vitepress/dist
          find . -type f ! -path './.git/*' -exec sh -c '
            bucket="$1"
            endpoint="$2"
            shift 2
            for f do
              target="${f#./}"
              echo "Uploading: $target"
              aws s3api put-object --bucket "$bucket" --key "$target" --body "$f" --endpoint-url "$endpoint" || exit 1
            done
          ' sh "${{ secrets.SEALOS_PREVIEW_BUCKET }}" "${{ secrets.SEALOS_ENDPOINT }}" {} +
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SEALOS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SEALOS_SECRET_KEY }}
          AWS_REGION: us-east-1

      # PR 关闭时：清理预览
      - name: Cleanup preview
        if: github.event.action == 'closed'
        run: |
          aws s3api list-objects-v2 --bucket "${{ secrets.SEALOS_PREVIEW_BUCKET }}" --endpoint-url "${{ secrets.SEALOS_ENDPOINT }}" --query 'Contents[].Key' --output text | tr "\t" "\n" | while read key; do
            [ -z "$key" ] && continue
            echo "Deleting: $key"
            aws s3api delete-object --bucket "${{ secrets.SEALOS_PREVIEW_BUCKET }}" --key "$key" --endpoint-url "${{ secrets.SEALOS_ENDPOINT }}"
          done
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SEALOS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SEALOS_SECRET_KEY }}
          AWS_REGION: us-east-1

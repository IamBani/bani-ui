name: PR Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "pnpm"

      # PR 打开/更新时：构建并部署预览
      - name: Install dependencies
        if: github.event.action != 'closed'
        run: pnpm install

      - name: Build docs
        if: github.event.action != 'closed'
        run: pnpm run build:docs

      - name: Deploy preview to Sealos
        if: github.event.action != 'closed'
        uses: jakejarvis/s3-sync-action@v0.5.1
        with:
          args: --delete --exclude '.git/*'
        env:
          AWS_S3_BUCKET: ${{ secrets.SEALOS_PREVIEW_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.SEALOS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SEALOS_SECRET_KEY }}
          AWS_S3_ENDPOINT: ${{ secrets.SEALOS_ENDPOINT }}
          AWS_REGION: us-east-1
          SOURCE_DIR: packages/docs/.vitepress/dist

      # PR 关闭时：清理预览
      - name: Cleanup preview
        if: github.event.action == 'closed'
        run: aws s3 rm s3://${{ secrets.SEALOS_PREVIEW_BUCKET }}/ --recursive
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SEALOS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SEALOS_SECRET_KEY }}
          AWS_S3_ENDPOINT: ${{ secrets.SEALOS_ENDPOINT }}
          AWS_REGION: us-east-1

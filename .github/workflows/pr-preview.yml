name: PR Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - "packages/docs/**"

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # PR 打开/更新时：构建并部署预览
      - name: Install dependencies
        if: github.event.action != 'closed'
        run: pnpm install

      - name: Build bani-ui
        if: github.event.action != 'closed'
        run: pnpm run build

      - name: Build docs
        if: github.event.action != 'closed'
        run: pnpm run build:docs

      - name: Deploy preview to Sealos
        if: github.event.action != 'closed'
        run: |
          cd packages/docs/.vitepress/dist
          find . -type f ! -path './.git/*' -exec sh -c '
            bucket="$1"
            endpoint="$2"
            shift 2
            for f do
              target="${f#./}"
              target="bani-ui/$target"
              case "$target" in
                *.html)   type="text/html" ;;
                *.css)    type="text/css" ;;
                *.js)     type="application/javascript" ;;
                *.png)    type="image/png" ;;
                *.jpg|*.jpeg) type="image/jpeg" ;;
                *.svg)    type="image/svg+xml" ;;
                *.ico)    type="image/x-icon" ;;
                *.woff2)  type="font/woff2" ;;
                *.woff)   type="font/woff" ;;
                *.json)   type="application/json" ;;
                *.map)    type="application/json" ;;
                *)        type="application/octet-stream" ;;
              esac
              echo "Uploading: $target ($type)"
              aws s3api put-object --bucket "$bucket" --key "$target" --body "$f" --content-type "$type" --endpoint-url "$endpoint" || exit 1
            done
          ' sh "${{ secrets.SEALOS_PREVIEW_BUCKET }}" "${{ secrets.SEALOS_ENDPOINT }}" {} +
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SEALOS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SEALOS_SECRET_KEY }}
          AWS_REGION: us-east-1

      - name: Upload root redirect
        if: github.event.action != 'closed'
        run: |
          printf '<html><head><meta http-equiv="refresh" content="0;url=/bani-ui/"><script>location.href="/bani-ui/"</script></head><body><a href="/bani-ui/">Redirecting to /bani-ui/</a></body></html>\n' > /tmp/redirect.html
          aws s3api put-object --bucket "${{ secrets.SEALOS_PREVIEW_BUCKET }}" --key "index.html" --body /tmp/redirect.html --content-type "text/html" --endpoint-url "${{ secrets.SEALOS_ENDPOINT }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SEALOS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SEALOS_SECRET_KEY }}
          AWS_REGION: us-east-1

      # PR 关闭时：清理预览（需手动在 Sealos 控制台删除预览桶文件）
      # 由于密钥没有 ListBucket 权限，无法自动列出并删除对象

name: Deploy Docs to Sealos

on:
  push:
    branches:
      - main
    paths:
      - "packages/docs/**"
      - "packages/components/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build bani-ui
        run: pnpm run build

      - name: Build docs
        run: pnpm run build:docs

      - name: Debug - test connection
        run: |
          echo "Testing bucket: ${{ secrets.SEALOS_BUCKET }}"
          echo "Testing endpoint: ${{ secrets.SEALOS_ENDPOINT }}"
          aws s3api list-buckets --endpoint-url ${{ secrets.SEALOS_ENDPOINT }}
          aws s3 ls s3://${{ secrets.SEALOS_BUCKET }}/ --endpoint-url ${{ secrets.SEALOS_ENDPOINT }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SEALOS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SEALOS_SECRET_KEY }}
          AWS_REGION: us-east-1

      - name: Upload to Sealos Object Storage
        run: aws s3 sync packages/docs/.vitepress/dist/ s3://${{ secrets.SEALOS_BUCKET }}/ --delete --exclude '.git/*' --endpoint-url ${{ secrets.SEALOS_ENDPOINT }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SEALOS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SEALOS_SECRET_KEY }}
          AWS_REGION: us-east-1

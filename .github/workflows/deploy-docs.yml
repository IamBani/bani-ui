name: Deploy Docs to Sealos

on:
  push:
    branches:
      - main
    paths:
      - "packages/docs/**"
      - "packages/components/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build bani-ui
        run: pnpm run build

      - name: Build docs
        run: pnpm run build:docs

      - name: Upload to Sealos Object Storage
        run: |
          cd packages/docs/.vitepress/dist
          find . -type f ! -path './.git/*' -exec sh -c '
            bucket="$1"
            endpoint="$2"
            shift 2
            for f do
              target="${f#./}"
              echo "Uploading: $target"
              aws s3api put-object --bucket "$bucket" --key "$target" --body "$f" --endpoint-url "$endpoint" || exit 1
            done
          ' sh "${{ secrets.SEALOS_BUCKET }}" "${{ secrets.SEALOS_ENDPOINT }}" {} +
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SEALOS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SEALOS_SECRET_KEY }}
          AWS_REGION: us-east-1

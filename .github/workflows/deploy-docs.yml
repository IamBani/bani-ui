name: Deploy Docs to Sealos

on:
  push:
    branches:
      - main
    paths:
      - "packages/docs/**"
      - "packages/components/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build bani-ui
        run: pnpm run build

      - name: Build docs
        run: pnpm run build:docs

      - name: Upload to Sealos Object Storage
        run: |
          cd packages/docs/.vitepress/dist
          find . -type f ! -path './.git/*' -exec sh -c '
            bucket="$1"
            endpoint="$2"
            shift 2
            for f do
              target="${f#./}"
              target="bani-ui/$target"
              case "$target" in
                *.html)   type="text/html" ;;
                *.css)    type="text/css" ;;
                *.js)     type="application/javascript" ;;
                *.png)    type="image/png" ;;
                *.jpg|*.jpeg) type="image/jpeg" ;;
                *.svg)    type="image/svg+xml" ;;
                *.ico)    type="image/x-icon" ;;
                *.woff2)  type="font/woff2" ;;
                *.woff)   type="font/woff" ;;
                *.json)   type="application/json" ;;
                *.map)    type="application/json" ;;
                *)        type="application/octet-stream" ;;
              esac
              echo "Uploading: $target ($type)"
              aws s3api put-object --bucket "$bucket" --key "$target" --body "$f" --content-type "$type" --endpoint-url "$endpoint" || exit 1
            done
          ' sh "${{ secrets.SEALOS_BUCKET }}" "${{ secrets.SEALOS_ENDPOINT }}" {} +

      - name: Upload root redirect
        run: |
          redirect='<html><head><meta http-equiv="refresh" content="0;url=/bani-ui/"><script>location.href="/bani-ui/"</script></head><body><a href="/bani-ui/">Redirecting to /bani-ui/</a></body></html>'
          echo "$redirect" | aws s3api put-object --bucket "${{ secrets.SEALOS_BUCKET }}" --key "index.html" --body /dev/stdin --content-type "text/html" --endpoint-url "${{ secrets.SEALOS_ENDPOINT }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SEALOS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SEALOS_SECRET_KEY }}
          AWS_REGION: us-east-1
